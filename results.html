<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BingeRoll | Results</title>
    <link rel = "icon" type="image/png" href = "favicon.png">

    <link rel = "stylesheet" href = "style-results.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class = left>
            <a href = "index.html"><img src = "logo.png" class = "logo"></a>

            <form class = "search" autocomplete = "off">
                <input type = "text" name = "movie" placeholder="What are you looking for?" autocomplete = "off">
                <button type = "submit"><i class = "fas fa-search"></i></button>
            </form>
        </div>

        <div class = "right">
            <button type = "submit" class = "searchButton"><i class = "fas fa-search"></i></button>
            <a href = "watchlist.html" id = "watchlistButton">
                <i class="fas fa-bookmark"></i>
                <span class="nav-text">Watchlist</span>
            </a>
            <button id = "signIn">
                <i class="fa-solid fa-user"></i>
                <span id="displayUsername" class="username"></span>
                <span class="nav-text">Sign in</span>
            </button>
        </div>
    </nav>

    <div class="mobileSearchContainer">
        <form class="mobileSearch" autocomplete="off">
            <input type="text" name="movie" placeholder="What are you looking for?" autocomplete="off">
            <button type="submit"><i class="fas fa-search"></i></button>
        </form>
    </div>

    <main>
        <h2 id = "searchTitle"></h2>
        <div id = "movieResults"></div>
    </main>

    <div class = "modal" id = "loginModal">
        <div class = "modalContent">
            <div class = "modalHeader">
                <h2>Login</h2>
                <button type="button" class = "closeButton">&times;</button>
            </div>
            <form class = "modalBody">
                <div class = "modalUser">
                    <input type="text" id="username" placeholder="Username" name="username" required autocomplete="off">
                    <i class="fas fa-user"></i>
                </div>
                <div class="modalPass">
                    <input type="password" placeholder="Password" required>
                    <button type="button" class="togglePassword">
                        <i class="fas fa-lock"></i>
                    </button>
                </div>
                <button id = "loginButton">Login</button>
                <p>Don't Have an Account? <a id="openRegister">Register</a></p>
            </form>
        </div>
    </div>

    <div class = "modal" id = "registerModal">
        <div class = "modalContent">
            <div class = "modalHeader">
                <h2>Register</h2>
                <button type="button" class = "closeButton">&times;</button>
            </div>
            <form class = "modalBody">
                <div class = "modalUser">
                    <input type="text" id="username" placeholder="Username" name="username" required autocomplete="off">
                    <i class="fas fa-user"></i>
                </div>
                <div class="modalPass">
                    <input type="password" placeholder="Password" required>
                    <button type="button" class="togglePassword">
                        <i class="fas fa-lock"></i>
                    </button>
                </div>
                <div class = "repeatPass">
                    <input type="password" id="repPassword" placeholder="Re-enter Password" required>
                    <button type="button" class="togglePassword"><i class="fas fa-lock"></i></button>
                </div>
                <button id = "registerButton">Register</button>
                <p>Already Have an Account? <a id = "openLogin">Sign in</a></p>
            </form>
        </div>
    </div>

    <footer>
        © 2026 John Benedict Gala | All Rights Reserved
        <div class="link">
            <a href="https://www.facebook.com/JownB.7" target = "_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/jowneyyyy/" target = "_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://github.com/Kzarka7" target = "_blank"><i class="fab fa-github"></i></a>
        </div>
    </footer>

    <script src = "script-results.js"></script>
    
</body>
</html>
