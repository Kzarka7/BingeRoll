<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BingeRoll | Watchlist</title>

    <link rel = "stylesheet" href = "style-watchlist.css">
    <link rel = "stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href = "https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class = left>
            <a href = "index.html"><img src = "logo.png" class = "logo"></a>

            <form class = "search" autocomplete = "off">
                <input type = "text" id = "searchInput" name = "movie" placeholder="What are you looking for?" autocomplete = "off">
                <button type = "submit" id = "searchBtn"><i class = "fas fa-search"></i></button>
            </form>
        </div>

        <div class = "right">
            <button type = "submit" class = "searchButton"><i class = "fas fa-search"></i></button>
            <a href = "results.html" id = "watchlistButton">
                <i class="fas fa-bookmark"></i>
                <span class="nav-text">Watchlist</span>
            </a>
            <button id = "signIn">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span id="displayUsername" class="username"></span>
            </button>
        </div>
    </nav>

    <div class="mobileSearchContainer">
        <form class="mobileSearch" action = "results.html" method = "get" autocomplete="off">
            <input type="text" name="movie" placeholder="What are you looking for?" autocomplete="off">
            <button type="submit"><i class="fas fa-search"></i></button>
        </form>
    </div>

    <main>
        <h2>My Watchlist</h2>
        <div id="watchlistContainer"></div>
    </main>

    <footer>
        © 2026 John Benedict Gala | All Rights Reserved
        <div class="link">
            <a href="https://www.facebook.com/JownB.7" target = "_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/jowneyyyy/" target = "_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://github.com/Kzarka7" target = "_blank"><i class="fab fa-github"></i></a>
        </div>
    </footer>

    <script src = "watchlist.js"></script>
    
</body>
</html>
